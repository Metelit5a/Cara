version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - STORAGE_BACKEND=json
      - STORAGE_PATH=storage
      - CONFIDENCE_THRESHOLD=0.4
    volumes:
      - ./storage:/app/storage
      - ./model_service/checkpoints:/app/model_service/checkpoints

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

